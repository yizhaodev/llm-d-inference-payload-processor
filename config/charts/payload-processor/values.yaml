payloadProcessor:
  name: payload-processor
  replicas: 1
  image:
    registry: ghcr.io/llm-d
    repository: llm-d-inference-payload-processor
    tag: main
    pullPolicy: IfNotPresent
  port: 9004
  healthCheckPort: 9005
  multiNamespace: false

  flags:
    # Log verbosity
    v: 3

  customConfig: {}

  # Example defining a custom IPP configuration
  # customConfig:
  #   plugins:
  #   - type: body-field-to-header
  #     parameters:
  #       fieldName: model
  #       headerName: X-Gateway-Model-Name
  #   profiles:
  #   - name: default
  #     plugins:
  #       request:
  #       - pluginRef: body-field-to-header

  tracing:
    enabled: false
    otelServiceName: "inference.llm-d.ai/inference-payload-processor"
    otelExporterEndpoint: "http://localhost:4317"
    sampling:
      sampler: "parentbased_traceidratio"
      samplerArg: "0.1"

provider:
  name: none

  # ext_proc events configuration.
  # Controls which HTTP lifecycle events are sent to the payload processor.
  # Enable only the events that plugins actually need to process.
  supportedEvents:
    requestHeaders: true
    requestBody: true
    requestTrailers: true
    responseHeaders: true
    responseBody: true
    responseTrailers: true

  # Istio-specific configuration.
  # This block is only used if name is "istio".
  istio:
    envoyFilter:
      # Operation for inserting the ext_proc filter into the Envoy filter chain.
      operation: INSERT_FIRST
      # Anchor filter for INSERT_BEFORE/INSERT_AFTER (empty = no anchor).
      anchorSubFilter: ""

inferenceGateway:
  name: inference-gateway
