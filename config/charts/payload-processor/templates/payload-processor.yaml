apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Values.payloadProcessor.name }}
  namespace: {{ .Release.Namespace }}
spec:
  replicas: {{ .Values.payloadProcessor.replicas | default 1 }}
  selector:
    matchLabels:
      app: {{ .Values.payloadProcessor.name }}
  template:
    metadata:
      labels:
        app: {{ .Values.payloadProcessor.name }}
    spec:
      serviceAccountName: {{ .Values.payloadProcessor.name }}-{{ .Release.Name }}
      containers:
      - name: payload-processor
        image: {{ .Values.payloadProcessor.image.registry }}/{{ .Values.payloadProcessor.image.repository }}:{{ .Values.payloadProcessor.image.tag }}
        imagePullPolicy: {{ .Values.payloadProcessor.image.pullPolicy }}
        args:
        - "--streaming"
        # Pass additional flags via the payloadProcessor.flags field in values.yaml.
        {{- range $key, $value := .Values.payloadProcessor.flags }}
        - --{{ $key }}={{ $value }}
        {{- end }}      
        {{- range .Values.payloadProcessor.plugins }}
        - --plugin
        {{- if .json }}
        - {{ printf "%s:%s:%s" .type .name (toJson .json) | quote }}
        {{- else }}
        - {{ printf "%s:%s" .type .name | quote }}
        {{- end }}
        {{- end }}
        {{- if .Values.payloadProcessor.tracing.enabled}}
        - --tracing=true
        {{- else}}
        - --tracing=false
        {{- end}}
        env:
        {{- if not .Values.payloadProcessor.multiNamespace }}
        - name: NAMESPACE
          valueFrom:
            fieldRef:
              fieldPath: metadata.namespace
        {{- end }}
        {{- if .Values.payloadProcessor.tracing.enabled}}
        - name: OTEL_SERVICE_NAME
          value: {{ .Values.payloadProcessor.tracing.otelServiceName }}
        - name: OTEL_EXPORTER_OTLP_ENDPOINT
          value: {{ .Values.payloadProcessor.tracing.otelExporterEndpoint }}
        - name: OTEL_RESOURCE_ATTRIBUTES_NODE_NAME
          valueFrom:
            fieldRef:
              apiVersion: v1
              fieldPath: spec.nodeName
        - name: OTEL_RESOURCE_ATTRIBUTES_POD_NAME
          valueFrom:
            fieldRef:
              apiVersion: v1
              fieldPath: metadata.name
        - name: OTEL_RESOURCE_ATTRIBUTES
          value: 'k8s.namespace.name=$(NAMESPACE),k8s.node.name=$(OTEL_RESOURCE_ATTRIBUTES_NODE_NAME),k8s.pod.name=$(OTEL_RESOURCE_ATTRIBUTES_POD_NAME)'
        - name: OTEL_TRACES_SAMPLER
          value: {{ .Values.payloadProcessor.tracing.sampling.sampler | quote }}
        - name: OTEL_TRACES_SAMPLER_ARG
          value: {{ .Values.payloadProcessor.tracing.sampling.samplerArg | quote }}
        - name: OTEL_TRACES_EXPORTER
          value: otlp
        {{- end}}
        ports:
        - containerPort: {{ .Values.payloadProcessor.port }}
        # health check
        - containerPort: {{ .Values.payloadProcessor.healthCheckPort }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ .Values.payloadProcessor.name }}
  namespace: {{ .Release.Namespace }}
spec:
  selector:
    app: {{ .Values.payloadProcessor.name }}
  ports:
  - protocol: TCP
    port: {{ .Values.payloadProcessor.port }}
    targetPort: {{ .Values.payloadProcessor.port }}
    appProtocol: HTTP2
  type: ClusterIP
